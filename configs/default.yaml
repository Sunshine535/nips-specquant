# AcceptSpec default configuration (v2.0, Apr 9)

# Primary model pair (Qwen3, standard MHA)
primary:
  draft: "Qwen/Qwen3-0.6B"
  target: "Qwen/Qwen3-8B"
  tag: "qwen3_0.6B_8B"

# Model pairs for experiments
model_pairs:
  # Primary (Qwen3, MHA)
  - draft: "Qwen/Qwen3-0.6B"
    target: "Qwen/Qwen3-8B"
    tag: "qwen3_0.6B_8B"
  # Cross-architecture (Llama 3.1)
  - draft: "meta-llama/Llama-3.2-3B"
    target: "meta-llama/Llama-3.1-8B"
    tag: "llama_3B_8B"
  # Hybrid architecture check (Qwen3.5, GatedDeltaNet)
  - draft: "Qwen/Qwen3.5-0.8B"
    target: "Qwen/Qwen3.5-9B"
    tag: "qwen35_0.8B_9B"

# AcceptSpec settings
acceptspec:
  oracle_quantizer_bits: 2
  oracle_sample_fraction: 0.2
  predictor_critical_fraction: 0.2
  predictor_moderate_fraction: 0.3
  calibration_problems: 50
  test_problems: 50

# Speculative decoding
spec_decode:
  gamma: 5
  temperature: 0.0
  max_new_tokens: 256

# KV quantization primitives
quant:
  bits: [2, 4]
  block_size: 128
  seed: 42

# Benchmark settings
benchmark:
  num_warmup: 2
  num_trials: 3
  seeds: [42, 123, 456]

# Datasets
datasets:
  gsm8k:
    name: "openai/gsm8k"
    split: "test"
    num_full: 1319
    num_quick: 50
    num_oracle: 100
  math500:
    name: "hendrycks/MATH"
    split: "test"
    num_samples: 500

# Evaluation
eval:
  kv_budgets: [0.1, 0.2, 0.3, 0.5]
  temperatures: [0.0, 0.3, 0.6, 0.9]
  gammas: [3, 5, 7, 10]

# Baselines
baselines:
  quant_methods: ["rtn", "kivi", "absmax"]
  kv_compression: ["r-kv", "h2o", "snapkv"]
  external:
    r_kv_repo: "https://github.com/Zefan-Cai/R-KV"

# Hardware (auto-adaptive via gpu_auto.py)
hardware:
  dtype: "float16"
  auto_detect: true
